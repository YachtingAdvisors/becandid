<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Reach Out</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #fbf9f8;
      color: #313333;
      user-select: none;
    }
    .drag-region {
      -webkit-app-region: drag;
    }
    .container {
      padding: 40px 28px 28px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(34, 103, 121, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 24px;
    }
    h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #313333;
    }
    .subtitle {
      font-size: 12px;
      color: #5e5f5f;
      margin-top: 3px;
    }
    .field {
      -webkit-app-region: no-drag;
      margin-bottom: 16px;
    }
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #eeeeed;
      font-family: inherit;
      font-size: 13px;
      color: #313333;
      outline: none;
      resize: none;
      transition: box-shadow 0.2s, background 0.2s;
    }
    .field textarea:focus {
      box-shadow: 0 0 0 2px rgba(34, 103, 121, 0.25);
      background: #fff;
    }
    .field textarea::placeholder { color: #b1b2b2; }
    .char-count {
      text-align: right;
      font-size: 10px;
      color: #b1b2b2;
      margin-top: 4px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background: #226779;
      color: #f0fbff;
      box-shadow: 0 4px 12px rgba(34, 103, 121, 0.2);
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary {
      background: #eeeeed;
      color: #5e5f5f;
    }
    .btn-secondary:hover { background: #e4e4e3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header drag-region">
      <div class="icon">🤝</div>
      <h1>Reach Out</h1>
      <p class="subtitle">Send a quick message to your partner</p>
    </div>

    <div class="field">
      <textarea id="message" rows="3" maxlength="200" placeholder="I could use someone to talk to right now..."></textarea>
      <div class="char-count"><span id="count">0</span>/200</div>
    </div>

    <div class="buttons">
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const msg = document.getElementById('message');
    const count = document.getElementById('count');
    const sendBtn = document.getElementById('send-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    msg.addEventListener('input', () => {
      count.textContent = msg.value.length;
    });

    sendBtn.addEventListener('click', () => {
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      window.becandid.sendReachOut(msg.value.trim());
    });

    cancelBtn.addEventListener('click', () => {
      window.becandid.cancelReachOut();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.becandid.cancelReachOut();
      if (e.key === 'Enter' && e.metaKey) {
        sendBtn.click();
      }
    });

    msg.focus();
  </script>
</body>
</html>
