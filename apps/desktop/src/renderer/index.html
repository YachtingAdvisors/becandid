<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
  <title>Be Candid — Sign In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="logo-section">
      <img src="../../assets/logo.png" alt="Be Candid" class="logo-img" />
      <h1>Be Candid</h1>
      <p class="subtitle">Accountability Sanctuary</p>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <div class="form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>
      <button id="sign-in-btn" class="btn-primary">Sign In</button>
    </div>

    <p class="footer-text">
      Runs silently in your system tray. Screenshots are analyzed securely and never stored.
    </p>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
