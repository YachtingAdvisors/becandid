appId: io.becandid.desktop
productName: Be Candid
copyright: Copyright © 2026 Be Candid

directories:
  output: dist

files:
  - src/**/*
  - assets/**/*
  - package.json

# ── macOS ────────────────────────────────────────────────────
mac:
  category: public.app-category.lifestyle
  icon: assets/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  notarize: true

# ── macOS Notarization ───────────────────────────────────────
# Requires environment variables:
#   APPLE_ID=slaser90@gmail.com
#   APPLE_APP_SPECIFIC_PASSWORD=<app-specific-password>
#   APPLE_TEAM_ID=TH92H9399U
#
# Generate app-specific password at: https://appleid.apple.com
# Go to: Sign-In and Security → App-Specific Passwords → Generate
#
# electron-builder will automatically notarize when these env
# vars are set and `notarize: true` is configured above.

afterSign: scripts/notarize.js

# ── Windows ──────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always

# ── Auto-Update ──────────────────────────────────────────────
publish:
  provider: github
  owner: YachtingAdvisors
  repo: becandid
  releaseType: release

differentialDownload: true

# ── DMG ──────────────────────────────────────────────────────
dmg:
  title: Be Candid
