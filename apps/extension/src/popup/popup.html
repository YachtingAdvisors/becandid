<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=360">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; min-height: 200px; font-family: system-ui, -apple-system, sans-serif; background: #fbf9f8; color: #313333; }
    .header { background: linear-gradient(135deg, #226779, #0e5b6c); color: #f0fbff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.active { background: #4ade80; }
    .status-dot.inactive { background: #a83836; }
    .content { padding: 16px 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #5e5f5f; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 12px; border: none; border-radius: 10px; background: #eeeeed; font-size: 13px; color: #313333; outline: none; }
    .form-group input:focus { box-shadow: 0 0 0 2px rgba(34,103,121,0.2); background: #fff; }
    .btn-primary { width: 100%; padding: 12px; background: #226779; color: #f0fbff; border: none; border-radius: 9999px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { width: 100%; padding: 10px; background: transparent; color: #5e5f5f; border: 1px solid #b1b2b2; border-radius: 9999px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .error { background: rgba(168,56,54,0.08); color: #a83836; padding: 8px 12px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
    .stat-card { background: #fff; border-radius: 12px; padding: 12px; border: 1px solid rgba(177,178,178,0.1); }
    .stat-card .value { font-size: 20px; font-weight: 800; color: #226779; }
    .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #5e5f5f; margin-top: 2px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(177,178,178,0.15); }
    .toggle-row .text { font-size: 13px; font-weight: 600; }
    .toggle { width: 44px; height: 24px; border-radius: 12px; background: #b1b2b2; position: relative; cursor: pointer; transition: background 0.2s; }
    .toggle.on { background: #226779; }
    .toggle .knob { width: 20px; height: 20px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle.on .knob { left: 22px; }
    .domain-list { margin-top: 12px; }
    .domain-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 12px; border-bottom: 1px solid rgba(177,178,178,0.1); }
    .domain-row .name { font-weight: 600; color: #313333; }
    .domain-row .time { color: #226779; font-weight: 700; }
    .footer { padding: 12px 20px; text-align: center; font-size: 10px; color: #5e5f5f; border-top: 1px solid rgba(177,178,178,0.1); }
    #loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(34,103,121,0.2); border-top-color: #226779; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading"><div class="spinner"></div></div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
