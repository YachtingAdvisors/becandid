<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; margin: 0; padding: 0; background: #0d2030; }
  .container {
    width: 1024px;
    height: 500px;
    background: #0d2030;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20, 184, 166, 0.15) 0%, transparent 70%);
    top: 50%;
    left: 30%;
    transform: translate(-50%, -50%);
  }
  .glow2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
    top: 30%;
    right: 15%;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 60px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
  }
  .logo-text {
    font-size: 36px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -1px;
  }
  .tagline {
    font-size: 22px;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .highlight {
    color: #2dd4bf;
  }
  .subtitle {
    font-size: 14px;
    color: #64748b;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .pills {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .pill {
    padding: 6px 16px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8;
    font-size: 12px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo-row">
      <img src="icon-512.png" class="logo-icon" alt="" onerror="this.style.display='none'" />
      <span class="logo-text">Be Candid</span>
    </div>
    <div class="tagline">
      Align your digital life with your values.<br/>
      <span class="highlight">Accountability, not surveillance.</span>
    </div>
    <div class="subtitle">AI-Powered Digital Wellness</div>
    <div class="pills">
      <span class="pill">Pattern Detection</span>
      <span class="pill">Accountability Partners</span>
      <span class="pill">Guided Journaling</span>
      <span class="pill">Therapist Portal</span>
    </div>
  </div>
</div>
</body>
</html>
